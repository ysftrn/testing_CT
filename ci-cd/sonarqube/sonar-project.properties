# SonarQube Project Configuration for CryptoTracker
#
# This file tells sonar-scanner what to analyze.
# Place in project root or pass -Dsonar.projectBaseDir=<path>

# Project identification
sonar.projectKey=cryptotracker
sonar.projectName=CryptoTracker
sonar.projectVersion=1.0

# Source code
sonar.sources=sample-app/
sonar.sourceEncoding=UTF-8

# Test files
sonar.tests=sample-app/internal/service/
sonar.test.inclusions=**/*_test.go

# Go coverage
sonar.go.coverage.reportPaths=coverage.out

# Python (for API test analysis)
sonar.python.version=3

# Exclusions (don't analyze these)
sonar.exclusions=\
  **/vendor/**,\
  **/node_modules/**,\
  **/*.min.js,\
  **/web/static/**,\
  **/*_test.go

# Quality Gate
# Default gate: no new bugs, no new vulnerabilities,
# new code coverage > 80%, duplication < 3%
