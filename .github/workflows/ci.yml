name: CryptoTracker CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build
        run: |
          go build -o bin/cryptotracker ./sample-app/cmd/server/
          ls -la bin/cryptotracker

      - name: Go Unit Tests
        run: |
          go test -v -coverprofile=coverage.out ./sample-app/internal/service/
          go tool cover -func=coverage.out

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pytest

      - name: API Tests (Pytest)
        run: |
          ./bin/cryptotracker &
          for i in $(seq 1 30); do
            curl -s http://localhost:8080/api/health && break
            sleep 1
          done
          pytest tests/api/python/ -v --tb=short --junitxml=pytest-results.xml
          pytest tests/unittest/ -v --tb=short --junitxml=unittest-results.xml
          kill %1 2>/dev/null || true
          rm -f cryptotracker.db

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            *-results.xml
            coverage.out
